<app-entity-selector-modal
  [isOpen]="state.consumeModalOpen()"
  [title]="'pantry.consume.title' | translate"
  [cardTitle]="'pantry.consume.cardTitle' | translate"
  [subtitle]="'pantry.consume.subtitle' | translate"
  [placeholder]="'pantry.consume.placeholder' | translate"
  [emptyLabel]="'pantry.consume.noResults' | translate"
  [entriesEmptyLabel]="'pantry.consume.empty' | translate"
  [saveLabel]="'pantry.consume.submit' | translate"
  [saving]="state.isConsuming()"
  [disableSave]="!state.hasConsumeEntries()"
  [items]="state.consumeOptions()"
  [entries]="state.consumeEntryViewModels()"
  [showSecondaryInfo]="true"
  [showMeta]="false"
  [showEntryDate]="false"
  [showAllOnFocus]="true"
  [autofocus]="true"
  [showEmptyAction]="false"
  (willDismiss)="state.dismissConsumeModal()"
  (didDismiss)="state.closeConsumeModal()"
  (selectItem)="state.addConsumeEntry($event)"
  (queryChange)="state.onConsumeQueryChange($event)"
  (adjustEntry)="state.adjustConsumeEntryById($event.entry.id, $event.delta)"
  (save)="state.submitConsume()">
</app-entity-selector-modal>
