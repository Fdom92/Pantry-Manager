<app-entity-selector-modal
  [isOpen]="state.fastAddModalOpen()"
  [title]="'pantry.fastAdd.title' | translate"
  [cardTitle]="'pantry.fastAdd.cardTitle' | translate"
  [subtitle]="'pantry.fastAdd.subtitle' | translate"
  [placeholder]="'pantry.fastAdd.placeholder' | translate"
  [emptyLabel]="'pantry.fastAdd.noResults' | translate"
  [entriesEmptyLabel]="'pantry.fastAdd.empty' | translate"
  [saveLabel]="'pantry.fastAdd.submit' | translate"
  [saving]="state.isFastAdding()"
  [disableSave]="!state.hasFastAddEntries()"
  [items]="state.fastAddOptions()"
  [entries]="state.fastAddEntryViewModels()"
  [showSecondaryInfo]="true"
  [showMeta]="false"
  [showAllOnFocus]="true"
  [autofocus]="true"
  [showEmptyAction]="state.showFastAddEmptyAction()"
  [showEmptyActionWhenNoExactMatch]="true"
  [emptyActionLabel]="state.fastAddEmptyActionLabel()"
  (willDismiss)="state.dismissFastAddModal()"
  (didDismiss)="state.closeFastAddModal()"
  (selectItem)="state.addFastAddEntry($event)"
  (queryChange)="state.onFastAddQueryChange($event)"
  (emptyAction)="state.addFastAddEntryFromQuery($event)"
  (adjustEntry)="state.adjustFastAddEntryById($event.entry.id, $event.delta)"
  (entryDateChange)="state.setFastAddEntryDate($event.entry.id, $event.date)"
  (save)="state.submitFastAdd()">
</app-entity-selector-modal>
