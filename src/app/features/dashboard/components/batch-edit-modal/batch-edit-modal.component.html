<ion-modal
  [isOpen]="state.isOpen()"
  (willDismiss)="state.dismiss()"
  (didDismiss)="state.close()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>{{ state.titleKey() | translate }}</ion-title>
        <ion-buttons slot="end">
          <ion-button fill="clear" color="medium" (click)="state.dismiss()">
            <ion-icon slot="icon-only" name="close"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding">
      @for (item of state.filteredItems(); track item._id) {
        @if (state.action() === 'setFoodType') {
          <app-entity-selector-field
            class="batch-edit-selector"
            [label]="item.name"
            [items]="state.foodTypeOptions()"
            [clearLabel]="'pantry.form.foodType.unassigned' | translate"
            [showSearch]="false"
            [emptyLabel]="'common.selects.noOptions' | translate"
            [value]="state.getItemDisplayValue(item._id)"
            (optionSelected)="state.setItemValue(item._id, $event.raw ?? null)"
            (cleared)="state.setItemValue(item._id, null)">
          </app-entity-selector-field>
        }
        @if (state.action() === 'setCategory') {
          <app-entity-selector-field
            class="batch-edit-selector"
            [label]="item.name"
            [items]="state.categoryOptions()"
            [searchPlaceholder]="'pantry.form.categorySearchPlaceholder' | translate"
            [clearLabel]="'pantry.form.uncategorized' | translate"
            [emptyLabel]="'common.selects.noOptions' | translate"
            [value]="state.getItemDisplayValue(item._id)"
            (optionSelected)="state.setItemValue(item._id, $event.raw ?? null)"
            (cleared)="state.setItemValue(item._id, null)">
          </app-entity-selector-field>
        }
      }
    </ion-content>

    <ion-footer class="modal-footer">
      <ion-toolbar>
        <ion-button
          expand="block"
          color="primary"
          [disabled]="!state.canSave() || state.isSaving()"
          (click)="state.apply()">
          @if (state.isSaving()) {
            <ion-spinner name="dots"></ion-spinner>
          } @else {
            {{ 'common.actions.save' | translate }}
          }
        </ion-button>
      </ion-toolbar>
    </ion-footer>
  </ng-template>
</ion-modal>
